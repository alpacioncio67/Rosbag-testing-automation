# ──────────────────────────────────────────────────────────────
#  ROSBAG AUTOMATION TESTING — Configuration File
# ──────────────────────────────────────────────────────────────

# Directory layout
directories:
  test_bags  : "test_bags"              # Rosbags pendientes de testear
  failures   : "failures"              # Bags originales que fallaron
  reports    : "failures/reports"      # Reportes .txt de cada fallo
  recordings : "failures/recordings"   # .mcap grabados con ros2 bag record
  metadata   : "failures/metadata"     # metadata.yaml de cada grabación
  logs       : "logs"                  # Logs del tester

# ros2 launch command that starts the simulation node
# Equivalent to: ros2 launch <package> <launch_file> [extra_args...]
rosbag_launch:
  package     : "common_meta"
  launch_file : "rosbag_simulation_launch.py"
  extra_args  : []              # e.g. ["use_sim_time:=true"]

# ros2 bag play command
# Equivalent to: ros2 bag play <bag.mcap> [extra_args...]
rosbag_play:
  extra_args  : []              # e.g. ["--rate", "1.0"]

# Testing behaviour
testing:
  # Número de veces que se ejecuta cada rosbag antes de pasar al siguiente
  iteraciones_por_bag: 2
  # Seconds to wait after launching the simulation before starting playback
  launch_settle_seconds   : 2.0

  # Maximum seconds to wait for a single bag to finish playing.
  # Set to null for no timeout.
  play_timeout_seconds    : null

  # Seconds to sleep between cycles when no bags are found
  empty_dir_wait_seconds  : 10

  # Seconds to sleep per bag during dry-run (no ROS2 environment)
  dry_run_sleep_seconds   : 1.0

# ── Checkers ────────────────────────────────────────────────────────────────
# Lista de checkers que se ejecutan durante cada bag.
# 'type' debe coincidir con una clave del REGISTRY en checkers/__init__.py
#
# Para probar el pipeline:
#   - AlwaysPassChecker  →  nunca falla  (verifica el camino feliz)
#   - AlwaysFailChecker  →  siempre falla (verifica reporte + move a failures)
#
# Comenta/descomenta según lo que quieras probar:
checkers:
  # ── Checkers de prueba del pipeline ──────────────────────────
  # - type: AlwaysPassChecker
  # - type: AlwaysFailChecker

  # ── Checkers reales ───────────────────────────────────────────
  # El tipo de mensaje se autodescubre en runtime, no hace falta especificarlo.
  - type: TopicAliveChecker
    topic: /perception/map2
    seconds: 0.5

  - type: TopicAliveChecker
    topic: /slam/map2
    seconds: 20.0

  - type: TopicAliveChecker
    topic: /path_planning/trajectory2
    seconds: 20.0

  - type: PositionReceivedChecker
    topic: /car_state/state2
    max_jump: 1.0

  #- type: PlanningChecker
  #  planning_topic: /path_planning/trajectory2
  #  lap_topic: /car_state/car_info.lap_count
  #  threshold: 3.0
